<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>замок любви | открой сердце</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* предотвращает случайное выделение на телефоне */
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #1f2c2b, #0f171b);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', 'Quicksand', system-ui, -apple-system, sans-serif;
            padding: 16px;
            touch-action: manipulation; /* улучшает отклик тапов */
        }

        .app-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            margin: auto;
        }

        /* ГЛАВНАЯ ПАНЕЛЬ С ЗАМКОМ */
        .lock-panel {
            background: rgba(28, 22, 18, 0.92);
            backdrop-filter: blur(6px);
            border-radius: 64px;
            padding: 1.7rem 1.2rem 2rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), inset 0 1px 2px rgba(255, 215, 150, 0.2);
            border: 1px solid rgba(210, 170, 110, 0.6);
            transition: opacity 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1), transform 0.5s ease;
        }

        .lock-panel.hidden {
            opacity: 0;
            visibility: hidden;
            transform: scale(0.92) translateY(8px);
            pointer-events: none;
        }

        .lock-header {
            text-align: center;
            margin-bottom: 16px;
        }

        .lock-icon {
            font-size: 3.4rem;
            filter: drop-shadow(0 6px 8px rgba(0,0,0,0.5));
        }

        .lock-title {
            color: #ffefcf;
            font-weight: 600;
            letter-spacing: 1.5px;
            font-size: 1rem;
            background: #2f221bb3;
            display: inline-block;
            padding: 5px 18px;
            border-radius: 100px;
            backdrop-filter: blur(4px);
            margin-top: 6px;
            font-size: 0.9rem;
        }

        /* ЦИФРОВОЙ КОД (3 слота) */
        .digit-code {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0 24px;
            flex-wrap: nowrap;
        }

        .digit-slot {
            background: #12100c;
            width: 80px;
            height: 94px;
            border-radius: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.8rem;
            font-weight: 800;
            font-family: 'Courier New', 'Fira Mono', monospace;
            color: #ffd58c;
            text-shadow: 0 0 5px #ff964f;
            box-shadow: inset 0 2px 6px rgba(0,0,0,0.7), 0 8px 12px rgba(0,0,0,0.4);
            border-bottom: 3px solid #cb9e62;
            background: #1f1913;
            transition: transform 0.08s linear;
        }

        /* КЛАВИАТУРА 3x3 + 0 */
        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            max-width: 270px;
            margin: 16px auto 12px;
        }

        .key {
            background: #4f3822;
            border: none;
            font-size: 2rem;
            font-weight: bold;
            color: #fff0cf;
            padding: 12px 0;
            border-radius: 64px;
            font-family: monospace;
            cursor: pointer;
            transition: 0.06s linear;
            box-shadow: 0 5px 0 #2c1e12;
            transform: translateY(-2px);
            touch-action: manipulation;
        }

        .key:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #2c1e12;
        }

        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 18px;
            margin-top: 18px;
        }

        .btn {
            background: #5f4530;
            border: none;
            padding: 8px 20px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            color: #fff6e5;
            transition: 0.08s linear;
            box-shadow: 0 3px 6px rgba(0,0,0,0.3);
            touch-action: manipulation;
            letter-spacing: 0.5px;
        }

        .btn:active {
            transform: scale(0.96);
            background: #6f4f36;
        }

        .status-msg {
            text-align: center;
            margin-top: 22px;
            font-weight: 600;
            color: #ffe1aa;
            background: #261e17bc;
            padding: 8px 12px;
            border-radius: 80px;
            font-size: 0.8rem;
            backdrop-filter: blur(2px);
            letter-spacing: 0.4px;
        }

        /* ЭКРАН С ПАРЯЩИМИ СЕРДЦАМИ (FULLSCREEN LOVE) */
        .hearts-canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #2b141f, #050103);
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: opacity 1.2s cubic-bezier(0.2, 0.9, 0.3, 1.1);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .hearts-canvas-container.active {
            opacity: 1;
            visibility: visible;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* НИЖНЯЯ ПОДПИСЬ В ЭФИРЕ ЛЮБВИ */
        .info-love {
            position: absolute;
            bottom: 35px;
            left: 0;
            right: 0;
            text-align: center;
            font-family: 'Segoe UI', 'Poppins', system-ui;
            color: rgba(255, 245, 220, 0.98);
            font-size: 17px;
            font-weight: bold;
            pointer-events: none;
            z-index: 2100;
            background: rgba(0, 0, 0, 0.65);
            padding: 10px 20px;
            border-radius: 60px;
            width: fit-content;
            margin: 0 auto;
            backdrop-filter: blur(16px);
            letter-spacing: 0.8px;
            white-space: nowrap;
        }

        /* адаптив для узких телефонов */
        @media (max-width: 480px) {
            body {
                padding: 12px;
            }
            .digit-slot {
                width: 70px;
                height: 82px;
                font-size: 3rem;
                border-radius: 28px;
            }
            .key {
                font-size: 1.7rem;
                padding: 10px 0;
            }
            .keypad {
                gap: 10px;
                max-width: 240px;
            }
            .btn {
                padding: 6px 16px;
                font-size: 0.8rem;
            }
            .lock-title {
                font-size: 0.8rem;
            }
            .status-msg {
                font-size: 0.7rem;
            }
            .info-love {
                font-size: 13px;
                white-space: nowrap;
                bottom: 20px;
                padding: 6px 18px;
            }
        }
        
        @media (max-width: 380px) {
            .digit-slot {
                width: 60px;
                height: 72px;
                font-size: 2.6rem;
            }
            .digit-code {
                gap: 12px;
            }
            .key {
                font-size: 1.5rem;
            }
        }
        /* небольшой эффект дрожания при ошибке */
        .shake-error {
            animation: shakeBox 0.12s ease-in-out 0s 2;
        }
        @keyframes shakeBox {
            0% { transform: translateX(0px); }
            25% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
            100% { transform: translateX(0); }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div id="lockPanel" class="lock-panel">
        <div class="lock-header">
            <div class="lock-icon">💘🔒</div>
            <div class="lock-title">♥ ЗАМОК ДВУХ СЕРДЕЦ ♥</div>
        </div>
        <div class="digit-code">
            <div class="digit-slot" id="digit1">0</div>
            <div class="digit-slot" id="digit2">0</div>
            <div class="digit-slot" id="digit3">0</div>
        </div>
        <div class="keypad" id="keypad"></div>
        <div class="action-buttons">
            <button class="btn" id="clearBtn">🗝️ СБРОС</button>
            <button class="btn" id="unlockBtn">💖 ОТКРЫТЬ</button>
        </div>
        <div class="status-msg" id="statusMsg">
            🔢 введи код 1 7 2
        </div>
    </div>
</div>

<div id="heartsStage" class="hearts-canvas-container">
    <canvas id="heartCanvas" width="1000" height="800"></canvas>
    <div class="info-love" id="stageMessage">💞 сердце наполняется нежностью... 💞</div>
</div>

<script>
    (function() {
        // СЕКРЕТНЫЙ КОД (число любви)
        const SECRET_CODE = "172";
        let enteredCode = "";
        
        const digitElements = {
            0: document.getElementById("digit1"),
            1: document.getElementById("digit2"),
            2: document.getElementById("digit3")
        };
        const statusDiv = document.getElementById("statusMsg");
        const lockPanel = document.getElementById("lockPanel");
        const heartsContainer = document.getElementById("heartsStage");
        
        // обновить визуал цифр
        function updateDigitsUI() {
            let padded = enteredCode.padEnd(3, "0");
            for(let i = 0; i < 3; i++) {
                if(digitElements[i]) digitElements[i].innerText = padded[i];
            }
        }
        
        // добавить цифру (совместимость с тапами телефона)
        function addDigit(num) {
            if(enteredCode.length >= 3) {
                statusDiv.innerText = "❌ максимум 3 цифры, нажми СБРОС";
                return;
            }
            enteredCode += num.toString();
            updateDigitsUI();
            if(enteredCode.length === 3) {
                statusDiv.innerText = "🔓 готово! нажми 'ОТКРЫТЬ'";
            } else {
                statusDiv.innerText = `⭐ код: ${enteredCode}${'_'.repeat(3 - enteredCode.length)}`;
            }
        }
        
        function resetCode() {
            enteredCode = "";
            updateDigitsUI();
            statusDiv.innerText = "✨ сброшено  ✨";
        }
        
        // визуальная ошибка + лёгкая тряска
        function wrongCodeAnimation() {
            const slots = document.querySelectorAll('.digit-slot');
            slots.forEach(slot => {
                slot.classList.add('shake-error');
                setTimeout(() => slot.classList.remove('shake-error'), 300);
            });
            // также кратковременное изменение статуса
            statusDiv.innerText = "❌ неверно!❌";
            setTimeout(() => {
                if(enteredCode.length === 0) statusDiv.innerText = "✨ введи код любви ✨";
                else statusDiv.innerText = `⭐ код: ${enteredCode.padEnd(3,'_')}`;
            }, 1300);
        }
        
        function tryUnlock() {
            if(enteredCode.length !== 3) {
                statusDiv.innerText = "⚠️ введи ровно 3 цифры";
                wrongCodeAnimation(); // лёгкая подсказка
                return;
            }
            if(enteredCode === SECRET_CODE) {
                statusDiv.innerText = "❤️ КОД ВЕРЕН! ЗАМОК РАСТАЯЛ В ЛЮБВИ... ❤️";
                // скрываем панель замка и показываем волшебную анимацию сердца
                lockPanel.classList.add("hidden");
                heartsContainer.classList.add("active");
                startHeartMagicAnimation();
            } else {
                wrongCodeAnimation();
                resetCode();  // автосброс для удобства на телефоне
            }
        }
        
        // ---------- АНИМАЦИЯ СЕРДЕЦ : ТЫСЯЧИ МЕРЦАЮЩИХ СЕРДЕЦ, НАДПИСЬ i love you ОГРОМНАЯ И НЕЖНАЯ ----------
        let animFrame = null;
        let particleArray = [];
        let animationStartTime = 0;
        const ANIM_DURATION = 11000; // 11 секунд для полного формирования
        
        function startHeartMagicAnimation() {
            if(animFrame) cancelAnimationFrame(animFrame);
            const canvas = document.getElementById("heartCanvas");
            if(!canvas) return;
            const ctx = canvas.getContext("2d");
            
            // ресайз под каждое устройство
            function resizeCanvasToWindow() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                if(particleArray.length) generateTargetPoints(canvas);
            }
            window.addEventListener('resize', () => {
                resizeCanvasToWindow();
                if(particleArray.length) generateTargetPoints(canvas);
            });
            resizeCanvasToWindow();
            
            // ГЕНЕРАЦИЯ ЦЕЛЕВЫХ ТОЧЕК: гигантская надпись "i love you" + изящный контур сердца (фон)
            function generateTargetPoints(canvas) {
                const w = canvas.width;
                const h = canvas.height;
                const centerX = w / 2;
                const centerY = h / 2.3;  // чуть выше для фокуса на надпись
                const heartScale = Math.min(w, h) * 0.45;
                
                // --- 1. Контур сердца (нежный, добавим объём)
                function heartFormulaPoint(t, scale, offX, offY, invertY = true) {
                    // классическое сердце: x = 16*sin^3 t , y = 13cos(t) - 5 cos(2t) - 2cos(3t) - cos(4t)
                    let xRaw = 16 * Math.pow(Math.sin(t), 3);
                    let yRaw = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t);
                    if(invertY) yRaw = -yRaw; // чтобы сердце стояло правильно (остриём вниз)
                    let px = offX + xRaw * scale;
                    let py = offY + yRaw * scale * 0.9;
                    return { x: px, y: py };
                }
                
                let heartContourPoints = [];
                for(let i = 0; i <= 520; i++) {
                    let t = (i / 520) * Math.PI * 2;
                    let pt = heartFormulaPoint(t, heartScale / 18.5, centerX, centerY, true);
                    heartContourPoints.push(pt);
                }
                // добавим внутренней пульсации вокруг контура
                for(let i = 0; i < 1800; i++) {
                    let base = heartContourPoints[Math.floor(Math.random() * heartContourPoints.length)];
                    let angle = Math.random() * Math.PI * 2;
                    let radius = 4 + Math.random() * 12;
                    heartContourPoints.push({
                        x: base.x + Math.cos(angle) * radius,
                        y: base.y + Math.sin(angle) * radius
                    });
                }
                
                // --- 2. ГЛАВНАЯ НАДПИСЬ "i love you" — ЯРКАЯ, ЧЁТКАЯ, ЗАНИМАЕТ ЦЕНТР, БОЛЬШАЯ, но не задыхается на телефоне
                // Создадим виртуальный canvas для текста, чтобы извлечь плотную карту пикселей
                const textCanvas = document.createElement('canvas');
                textCanvas.width = w;
                textCanvas.height = h;
                const textCtx = textCanvas.getContext('2d');
                
                // адаптивный шрифт: на телефоне не слишком огромный, но читаемый
                let fontSizeBase = Math.min(w, h) * 0.12;
                // для очень больших экранов не перебор
                fontSizeBase = Math.min(fontSizeBase, 70);
                fontSizeBase = Math.max(fontSizeBase, 42);
                textCtx.font = `800 ${fontSizeBase}px "Segoe UI", "Poppins", "Quicksand", system-ui, "Arial Black", sans-serif`;
                textCtx.textAlign = 'center';
                textCtx.textBaseline = 'middle';
                textCtx.fillStyle = 'white';
                // тень не нужна, но чёткость высокая
                textCtx.shadowBlur = 0;
                // строки: первая строка "i love you"
                const mainText = "i love you";
                textCtx.fillStyle = "#ffffff";
                textCtx.fillText(mainText, centerX, centerY - 5);
                // ПРОДУБЛИРУЕМ чтобы уплотнить (для яркости)
                textCtx.fillText(mainText, centerX, centerY - 4);
                textCtx.fillText(mainText, centerX, centerY - 6);
                
                // дополнительно легкий ореол для читаемости (мелкие точки вокруг)
                const imageData = textCtx.getImageData(0, 0, w, h);
                const data = imageData.data;
                
                let textPoints = [];
                // шаг сбора - мелкий, чтобы много точек, но не перегрузить (баланс)
                let stepX = 1.2;
                let stepY = 1.2;
                for(let y = 0; y < h; y += stepY) {
                    for(let x = 0; x < w; x += stepX) {
                        let ix = Math.floor(x);
                        let iy = Math.floor(y);
                        if(ix >= 0 && ix < w && iy >= 0 && iy < h) {
                            let idx = (iy * w + ix) * 4;
                            if(idx < data.length && data[idx] > 200) {
                                // добавим плотную сетку точек с небольшим смещением
                                textPoints.push({x: x, y: y});
                                textPoints.push({x: x + 0.5, y: y - 0.4});
                                textPoints.push({x: x - 0.6, y: y + 0.7});
                                textPoints.push({x: x + 0.9, y: y + 0.2});
                            }
                        }
                    }
                }
                
                // дополнительно интерполяция для сглаживания заполнения букв (без дырок)
                let refinedPoints = [...textPoints];
                for(let i = 0; i < textPoints.length; i+=2) {
                    if(i+1 < textPoints.length) {
                        let a = textPoints[i];
                        let b = textPoints[i+1];
                        let dist = Math.hypot(a.x - b.x, a.y - b.y);
                        if(dist > 1.2 && dist < 8) {
                            let mx = (a.x + b.x)/2;
                            let my = (a.y + b.y)/2;
                            refinedPoints.push({x: mx, y: my});
                            refinedPoints.push({x: mx + (Math.random() - 0.5)*1.5, y: my + (Math.random() - 0.5)*1.5 });
                        }
                    }
                }
                
                // добавляем тысячи дополнительных частиц для объема внутри надписи (сияние)
                for(let i = 0; i < 12000; i++) {
                    let angle = Math.random() * Math.PI * 2;
                    let rad = Math.random() * heartScale * 0.8;
                    let tx = centerX + Math.cos(angle) * rad;
                    let ty = centerY + Math.sin(angle) * rad * 0.85 + 8;
                    let ix = Math.floor(tx), iy = Math.floor(ty);
                    if(ix > 0 && ix < w && iy > 0 && iy < h) {
                        let idx = (iy * w + ix) * 4;
                        if(idx < data.length && data[idx] > 150) {
                            refinedPoints.push({x: tx + (Math.random()-0.5)*1.8, y: ty + (Math.random()-0.5)*1.8});
                        }
                    }
                }
                
                // ИТОГ: частицы надписи (основной фокус) + контур сердца для атмосферы (10% частиц)
                const TOTAL_PARTICLES = 38000;  // пышно, но современные телефоны справляются (канвас быстро)
                const TEXT_RATIO = 0.82;
                
                let finalTargets = [];
                for(let i=0; i<TOTAL_PARTICLES; i++) {
                    let useText = Math.random() < TEXT_RATIO;
                    let target;
                    if(useText && refinedPoints.length) {
                        let idx = Math.floor(Math.random() * refinedPoints.length);
                        target = refinedPoints[idx];
                    } else if(heartContourPoints.length) {
                        let idx = Math.floor(Math.random() * heartContourPoints.length);
                        target = heartContourPoints[idx];
                    } else {
                        target = {x: centerX, y: centerY};
                    }
                    
                    // цветовая гамма: для надписи - сочные оттенки красного, розового, кораллового (очень читаемо)
                    let color;
                    if(useText) {
                        // яркая палитра любви: розовый, алый, персиковый, горячее сердце
                        let hue = 340 + Math.random() * 18; // 340-358 оттенок розово-красный
                        color = `hsl(${hue}, 88%, 64%)`;
                    } else {
                        // контур сердца - нежные золотисто-розовые тона
                        color = `hsl(${350 + Math.random() * 15}, 75%, 58%)`;
                    }
                    
                    finalTargets.push({
                        x: Math.random() * w,
                        y: Math.random() * h,
                        targetX: target.x,
                        targetY: target.y,
                        color: color,
                        size: 11 + Math.random() * 16   // размер сердечек-emoji
                    });
                }
                // перемешать для эстетики
                for(let i = finalTargets.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [finalTargets[i], finalTargets[j]] = [finalTargets[j], finalTargets[i]];
                }
                particleArray = finalTargets;
            }
            
            generateTargetPoints(canvas);
            animationStartTime = performance.now();
            
            function animateLove(currentTime) {
                if(!ctx) return;
                const elapsed = currentTime - animationStartTime;
                let progress = Math.min(1, elapsed / ANIM_DURATION);
                const easeOut = 1 - Math.pow(1 - progress, 2.8);
                
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.globalCompositeOperation = 'source-over';
                ctx.shadowBlur = 0;
                
                // рисуем все частицы-сердца, которые плавно летят к своим целям
                for(let p of particleArray) {
                    const curX = p.x + (p.targetX - p.x) * easeOut;
                    const curY = p.y + (p.targetY - p.y) * easeOut;
                    // используем эмодзи сердца для каждой частички
                    let fontSizeVal = Math.floor(p.size);
                    ctx.font = `${fontSizeVal}px "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", system-ui`;
                    ctx.fillStyle = p.color;
                    ctx.fillText("❤️", curX, curY);
                }
                
                // обновляем нижний текст с настроением
                const msgDiv = document.getElementById("stageMessage");
                if(msgDiv) {
                    if(progress < 0.3) msgDiv.innerText = "💗 магия собирает все искры... 💗";
                    else if(progress < 0.65) msgDiv.innerText = "✨ внутри проявляется главное слово ✨";
                    else msgDiv.innerText = "🌹  i   l o v e   y o u  🌹";
                }
                
                if(progress < 1) {
                    animFrame = requestAnimationFrame(animateLove);
                } else {
                    // финальный кадр: фиксация с лёгким сиянием для чёткости
                    ctx.save();
                    ctx.shadowBlur = 6;
                    ctx.shadowColor = "rgba(255, 80, 120, 0.6)";
                    for(let p of particleArray) {
                        ctx.font = `${Math.floor(p.size)}px "Segoe UI Emoji"`;
                        ctx.fillStyle = p.color;
                        ctx.fillText("❤️", p.targetX, p.targetY);
                    }
                    ctx.restore();
                    if(msgDiv) msgDiv.style.background = "rgba(0,0,0,0.8)";
                    cancelAnimationFrame(animFrame);
                    animFrame = null;
                }
            }
            
            if(animFrame) cancelAnimationFrame(animFrame);
            animationStartTime = performance.now();
            animFrame = requestAnimationFrame(animateLove);
        }
        
        // -------- СОЗДАНИЕ КЛАВИАТУРЫ ДЛЯ ТЕЛЕФОНА (динамически) --------
        function buildPhoneKeypad() {
            const keypadDiv = document.getElementById("keypad");
            if(!keypadDiv) return;
            keypadDiv.innerHTML = "";
            for(let i=1; i<=9; i++) {
                const btn = document.createElement("button");
                btn.innerText = i;
                btn.classList.add("key");
                btn.addEventListener("click", (e) => { e.preventDefault(); addDigit(i); });
                keypadDiv.appendChild(btn);
            }
            const zeroBtn = document.createElement("button");
            zeroBtn.innerText = "0";
            zeroBtn.classList.add("key");
            zeroBtn.addEventListener("click", () => addDigit(0));
            keypadDiv.appendChild(zeroBtn);
            // пустышка для сетки (невидимый элемент)
            const spacer = document.createElement("div");
            spacer.style.visibility = "hidden";
            spacer.style.pointerEvents = "none";
            keypadDiv.appendChild(spacer);
        }
        
        // инициализация событий
        const clearBtn = document.getElementById("clearBtn");
        const unlockBtn = document.getElementById("unlockBtn");
        if(clearBtn) clearBtn.addEventListener("click", resetCode);
        if(unlockBtn) unlockBtn.addEventListener("click", tryUnlock);
        buildPhoneKeypad();
        resetCode();
    })();
</script>
</body>
