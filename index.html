<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>замок любви | сердце говорит</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 30% 20%, #1e2a2c, #0a0f12);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', 'Quicksand', system-ui, -apple-system, sans-serif;
            padding: 16px;
            touch-action: manipulation;
        }

        .app-container {
            position: relative;
            width: 100%;
            max-width: 520px;
            margin: auto;
        }

        /* панель замка */
        .lock-panel {
            background: rgba(28, 22, 18, 0.94);
            backdrop-filter: blur(8px);
            border-radius: 64px;
            padding: 1.6rem 1.2rem 1.8rem;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), inset 0 1px 2px rgba(255, 210, 130, 0.2);
            border: 1px solid rgba(210, 170, 110, 0.7);
            transition: opacity 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1), transform 0.5s ease;
        }

        .lock-panel.hidden {
            opacity: 0;
            visibility: hidden;
            transform: scale(0.92) translateY(10px);
            pointer-events: none;
        }

        .lock-header {
            text-align: center;
            margin-bottom: 14px;
        }

        .lock-icon {
            font-size: 3.2rem;
            filter: drop-shadow(0 5px 8px rgba(0,0,0,0.4));
        }

        .lock-title {
            color: #ffefcf;
            font-weight: 600;
            letter-spacing: 1.5px;
            font-size: 0.85rem;
            background: #2f221bb3;
            display: inline-block;
            padding: 5px 16px;
            border-radius: 100px;
            backdrop-filter: blur(4px);
            margin-top: 6px;
        }

        /* цифровой код (слоты) */
        .digit-code {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0 24px;
        }

        .digit-slot {
            background: #12100c;
            width: 80px;
            height: 94px;
            border-radius: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.8rem;
            font-weight: 800;
            font-family: 'Courier New', monospace;
            color: #ffd58c;
            text-shadow: 0 0 6px #ff964f;
            box-shadow: inset 0 2px 6px rgba(0,0,0,0.7), 0 8px 12px rgba(0,0,0,0.4);
            border-bottom: 3px solid #cb9e62;
            background: #1f1913;
        }

        /* клавиатура */
        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            max-width: 270px;
            margin: 16px auto 12px;
        }

        .key {
            background: #4f3822;
            border: none;
            font-size: 2rem;
            font-weight: bold;
            color: #fff0cf;
            padding: 12px 0;
            border-radius: 64px;
            font-family: monospace;
            cursor: pointer;
            transition: 0.06s linear;
            box-shadow: 0 5px 0 #2c1e12;
            transform: translateY(-2px);
            touch-action: manipulation;
        }

        .key:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #2c1e12;
        }

        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 18px;
            margin-top: 18px;
        }

        .btn {
            background: #5f4530;
            border: none;
            padding: 8px 20px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            color: #fff6e5;
            transition: 0.08s linear;
            box-shadow: 0 3px 6px rgba(0,0,0,0.3);
            touch-action: manipulation;
        }

        .btn:active {
            transform: scale(0.96);
        }

        .status-msg {
            text-align: center;
            margin-top: 22px;
            font-weight: 600;
            color: #ffe1aa;
            background: #261e17bc;
            padding: 8px 12px;
            border-radius: 80px;
            font-size: 0.8rem;
            backdrop-filter: blur(2px);
        }

        /* ЭКРАН ЛЮБВИ: большое сердце + четкая надпись */
        .hearts-canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, #2d1623, #040103);
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: opacity 1.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .hearts-canvas-container.active {
            opacity: 1;
            visibility: visible;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .info-love {
            position: absolute;
            bottom: 35px;
            left: 0;
            right: 0;
            text-align: center;
            font-family: 'Segoe UI', 'Poppins', system-ui;
            color: rgba(255, 245, 220, 0.98);
            font-size: 17px;
            font-weight: bold;
            pointer-events: none;
            z-index: 2100;
            background: rgba(0, 0, 0, 0.65);
            padding: 10px 20px;
            border-radius: 60px;
            width: fit-content;
            margin: 0 auto;
            backdrop-filter: blur(16px);
            letter-spacing: 1px;
            white-space: nowrap;
        }

        /* адаптив для телефонов: сердечная панель крупнее и надпись читабельна */
        @media (max-width: 550px) {
            .digit-slot {
                width: 70px;
                height: 82px;
                font-size: 3rem;
            }
            .key {
                font-size: 1.7rem;
                padding: 10px 0;
            }
            .keypad {
                gap: 10px;
                max-width: 240px;
            }
            .btn {
                padding: 6px 16px;
                font-size: 0.8rem;
            }
            .info-love {
                font-size: 13px;
                bottom: 20px;
                white-space: nowrap;
            }
        }
        @media (max-width: 400px) {
            .digit-slot {
                width: 60px;
                height: 72px;
                font-size: 2.6rem;
            }
            .digit-code {
                gap: 12px;
            }
        }

        .shake-error {
            animation: shakeBox 0.12s ease-in-out 0s 2;
        }
        @keyframes shakeBox {
            0% { transform: translateX(0px); }
            25% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
            100% { transform: translateX(0); }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div id="lockPanel" class="lock-panel">
        <div class="lock-header">
            <div class="lock-icon">💘🔒</div>
            <div class="lock-title">♥ ЗАМОК ДВУХ СЕРДЕЦ ♥</div>
        </div>
        <div class="digit-code">
            <div class="digit-slot" id="digit1">0</div>
            <div class="digit-slot" id="digit2">0</div>
            <div class="digit-slot" id="digit3">0</div>
        </div>
        <div class="keypad" id="keypad"></div>
        <div class="action-buttons">
            <button class="btn" id="clearBtn">🗝️ СБРОС</button>
            <button class="btn" id="unlockBtn">💖 ОТКРЫТЬ</button>
        </div>
        <div class="status-msg" id="statusMsg">🔢 введи код 1 7 2</div>
    </div>
</div>

<div id="heartsStage" class="hearts-canvas-container">
    <canvas id="heartCanvas"></canvas>
    <div class="info-love" id="stageMessage">💗 сердце наполняется нежностью... 💗</div>
</div>

<script>
    (function() {
        const SECRET_CODE = "172";
        let enteredCode = "";
        
        const digitElements = {
            0: document.getElementById("digit1"),
            1: document.getElementById("digit2"),
            2: document.getElementById("digit3")
        };
        const statusDiv = document.getElementById("statusMsg");
        const lockPanel = document.getElementById("lockPanel");
        const heartsContainer = document.getElementById("heartsStage");
        
        function updateDigitsUI() {
            let padded = enteredCode.padEnd(3, "0");
            for(let i = 0; i < 3; i++) {
                if(digitElements[i]) digitElements[i].innerText = padded[i];
            }
        }
        
        function addDigit(num) {
            if(enteredCode.length >= 3) {
                statusDiv.innerText = "❌ максимум 3 цифры, нажми СБРОС";
                return;
            }
            enteredCode += num.toString();
            updateDigitsUI();
            if(enteredCode.length === 3) {
                statusDiv.innerText = "🔓 готово! нажми 'ОТКРЫТЬ'";
            } else {
                statusDiv.innerText = `⭐ код: ${enteredCode}${'_'.repeat(3 - enteredCode.length)}`;
            }
        }
        
        function resetCode() {
            enteredCode = "";
            updateDigitsUI();
            statusDiv.innerText = "✨ сброшено ✨";
        }
        
        function wrongCodeAnimation() {
            const slots = document.querySelectorAll('.digit-slot');
            slots.forEach(slot => {
                slot.classList.add('shake-error');
                setTimeout(() => slot.classList.remove('shake-error'), 300);
            });
            statusDiv.innerText = "❌ неверно!  ❌";
            setTimeout(() => {
                if(enteredCode.length === 0) statusDiv.innerText = "✨ введи код любви ✨";
                else statusDiv.innerText = `⭐ код: ${enteredCode.padEnd(3,'_')}`;
            }, 1300);
        }
        
        function tryUnlock() {
            if(enteredCode.length !== 3) {
                statusDiv.innerText = "⚠️ введи 3 цифры";
                wrongCodeAnimation();
                return;
            }
            if(enteredCode === SECRET_CODE) {
                statusDiv.innerText = "❤️ КОД ВЕРЕН! ЗАМОК РАСТАЯЛ В ЛЮБВИ... ❤️";
                lockPanel.classList.add("hidden");
                heartsContainer.classList.add("active");
                startLoveAnimationWithBigHeartAndText();
            } else {
                wrongCodeAnimation();
                resetCode();
            }
        }
        
        // ----- НОВАЯ АНИМАЦИЯ: БОЛЬШОЕ СЕРДЦЕ + ЧЁТКАЯ НАДПИСЬ "i love you" -----
        let animationFrame = null;
        let particles = [];
        let animStartTime = 0;
        const ANIM_DURATION = 10000; // 10 секунд на сборку
        
        function startLoveAnimationWithBigHeartAndText() {
            if(animationFrame) cancelAnimationFrame(animationFrame);
            const canvas = document.getElementById("heartCanvas");
            if(!canvas) return;
            const ctx = canvas.getContext("2d");
            
            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                if(particles.length) generateTargets(canvas);
            }
            window.addEventListener('resize', () => {
                resizeCanvas();
                if(particles.length) generateTargets(canvas);
            });
            resizeCanvas();
            
            // ГЕНЕРАЦИЯ: БОЛЬШУЩЕЕ СЕРДЦЕ (увеличено) + в центре гигантская надпись "i love you" из отдельных частиц, но выглядит как текст
            function generateTargets(canvas) {
                const w = canvas.width;
                const h = canvas.height;
                const centerX = w / 2;
                const centerY = h / 2.2;   // чуть выше, чтобы сердце было крупным и надпись в центре
                // УВЕЛИЧИВАЕМ СЕРДЦЕ — используем большой масштаб (на телефоне будет занимать почти весь экран)
                const heartScale = Math.min(w, h) * 0.56;  // крупное сердце
                
                // 1) КОНТУР СЕРДЦА (массив точек для фона, чтобы создать форму)
                function heartCurve(t, scale, offX, offY, flipY = true) {
                    let xRaw = 16 * Math.pow(Math.sin(t), 3);
                    let yRaw = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t);
                    if(flipY) yRaw = -yRaw;  // остриё вниз
                    let px = offX + xRaw * scale;
                    let py = offY + yRaw * scale * 0.9;
                    return { x: px, y: py };
                }
                
                let heartContour = [];
                for(let i = 0; i <= 600; i++) {
                    let t = (i / 600) * Math.PI * 2;
                    let pt = heartCurve(t, heartScale / 17.5, centerX, centerY, true);
                    heartContour.push(pt);
                }
                // утолщаем контур для объёма (но остаётся фоном)
                for(let i=0; i<2500; i++) {
                    let base = heartContour[Math.floor(Math.random() * heartContour.length)];
                    let angle = Math.random() * Math.PI * 2;
                    let r = 3 + Math.random() * 12;
                    heartContour.push({ x: base.x + Math.cos(angle)*r, y: base.y + Math.sin(angle)*r });
                }
                
                // 2) ГЛАВНОЕ: НАДПИСЬ "i love you"  —  БОЛЬШАЯ, ЧЁТКАЯ, ВНУТРИ СЕРДЦА
                // Создаём временный canvas для извлечения пикселей текста, чтобы получить плотный массив точек-частиц, формирующих буквы
                const textCanvas = document.createElement('canvas');
                textCanvas.width = w;
                textCanvas.height = h;
                const textCtx = textCanvas.getContext('2d');
                
                // ОЧЕНЬ КРУПНЫЙ ШРИФТ (занимает центральную часть сердца)
                let fontSize = Math.min(w, h) * 0.13;
                fontSize = Math.min(fontSize, 88);   // для больших экранов не слишком
                fontSize = Math.max(fontSize, 48);    // на телефонах не меньше 48px
                textCtx.font = `900 ${fontSize}px "Segoe UI", "Poppins", "Quicksand", "Arial Black", system-ui, sans-serif`;
                textCtx.textAlign = 'center';
                textCtx.textBaseline = 'middle';
                textCtx.fillStyle = 'white';
                textCtx.shadowBlur = 0;
                const loveText = "i love you";
                // Рисуем текст несколько раз для насыщенности (чтобы не было пробелов)
                textCtx.fillText(loveText, centerX, centerY - 5);
                textCtx.fillText(loveText, centerX, centerY - 4);
                textCtx.fillText(loveText, centerX, centerY - 6);
                textCtx.fillText(loveText, centerX, centerY - 3);
                
                // Получаем пиксели
                const imageData = textCtx.getImageData(0, 0, w, h);
                const data = imageData.data;
                
                let textPoints = [];
                // Шаг сбора — плотный, чтобы надпись выглядела монолитно 
                const step = 1.2;  
                for(let y = 0; y < h; y += step) {
                    for(let x = 0; x < w; x += step) {
                        const ix = Math.floor(x);
                        const iy = Math.floor(y);
                        if(ix >= 0 && ix < w && iy >=0 && iy < h) {
                            const idx = (iy * w + ix) * 4;
                            if(idx < data.length && data[idx] > 210) {
                                // Добавляем точки с микросмещением, чтобы заполнить буквы без дырок
                                textPoints.push({x: x, y: y});
                                textPoints.push({x: x + 0.6, y: y - 0.4});
                                textPoints.push({x: x - 0.5, y: y + 0.7});
                                textPoints.push({x: x + 0.9, y: y + 0.2});
                            }
                        }
                    }
                }
                
                // Дополнительное уплотнение — интеполяция между ближайшими точками
                let extraPoints = [...textPoints];
                for(let i = 0; i < textPoints.length; i += 2) {
                    if(i+1 < textPoints.length) {
                        let a = textPoints[i];
                        let b = textPoints[i+1];
                        let dist = Math.hypot(a.x - b.x, a.y - b.y);
                        if(dist > 1.8 && dist < 8) {
                            let mx = (a.x + b.x)/2;
                            let my = (a.y + b.y)/2;
                            extraPoints.push({x: mx, y: my});
                            extraPoints.push({x: mx + (Math.random() - 0.5)*1.4, y: my + (Math.random() - 0.5)*1.4});
                        }
                    }
                }
                
                // Добавляем тысячи вспомогательных точек внутри зоны надписи для максимальной яркости
                for(let i = 0; i < 18000; i++) {
                    let angleRand = Math.random() * Math.PI * 2;
                    let rad = Math.random() * heartScale * 0.85;
                    let testX = centerX + Math.cos(angleRand) * rad;
                    let testY = centerY + Math.sin(angleRand) * rad * 0.85 + 5;
                    let ix = Math.floor(testX), iy = Math.floor(testY);
                    if(ix > 0 && ix < w && iy > 0 && iy < h) {
                        let idx = (iy * w + ix) * 4;
                        if(idx < data.length && data[idx] > 160) {
                            extraPoints.push({x: testX + (Math.random() - 0.5)*1.3, y: testY + (Math.random() - 0.5)*1.3});
                        }
                    }
                }
                
                // Все итоговые точки для надписи
                const finalTextPoints = extraPoints;
                console.log("Точек текста (i love you):", finalTextPoints.length);
                
                // ---- СОЗДАНИЕ ЧАСТИЦ: 88% частиц будут образовывать надпись, 12% — нежный контур сердца (фон)
                const TOTAL_PARTICLES = 38000;
                const TEXT_RATIO = 0.88;
                let newParticles = [];
                
                for(let i=0; i<TOTAL_PARTICLES; i++) {
                    let isTextPoint = Math.random() < TEXT_RATIO;
                    let targetPos;
                    if(isTextPoint && finalTextPoints.length) {
                        let idx = Math.floor(Math.random() * finalTextPoints.length);
                        targetPos = finalTextPoints[idx];
                    } else if(heartContour.length) {
                        let idx = Math.floor(Math.random() * heartContour.length);
                        targetPos = heartContour[idx];
                    } else {
                        targetPos = {x: centerX, y: centerY};
                    }
                    
                    // Цвета: для букв – сочный розово-алый,  для контура – нежный золотистый
                    let particleColor;
                    if(isTextPoint) {
                        // яркие оттенки любви – малиновый, коралловый, красный
                        let hue = 340 + Math.random() * 18;
                        particleColor = `hsl(${hue}, 90%, 67%)`;
                    } else {
                        particleColor = `hsl(${350 + Math.random() * 12}, 80%, 62%)`;
                    }
                    
                    newParticles.push({
                        x: Math.random() * w,
                        y: Math.random() * h,
                        targetX: targetPos.x,
                        targetY: targetPos.y,
                        color: particleColor,
                        size: 12 + Math.random() * 15   // размер эмодзи (но мы будем рисовать не сердечки, а буквы!)
                    });
                }
                // перемешивание
                for(let i=newParticles.length-1; i>0; i--) {
                    const j = Math.floor(Math.random()*(i+1));
                    [newParticles[i], newParticles[j]] = [newParticles[j], newParticles[i]];
                }
                particles = newParticles;
            }
            
            generateTargets(canvas);
            animStartTime = performance.now();
            
            function animateFormation(now) {
                if(!ctx) return;
                const elapsed = now - animStartTime;
                let t = Math.min(1, elapsed / ANIM_DURATION);
                const easeProgress = 1 - Math.pow(1 - t, 2.5); // плавное движение
                
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.globalCompositeOperation = 'source-over';
                ctx.shadowBlur = 0;
                
                // РИСУЕМ ЧАСТИЦЫ, НО КАЖДАЯ ЧАСТИЦА — ЭТО БУКВА? НЕТ, КАЖДАЯ ЧАСТИЦА РИСУЕТСЯ КАК МАЛЕНЬКОЕ СЕРДЕЧКО, 
                // НО ЧТОБЫ ПОЛУЧИЛАСЬ НАДПИСЬ ИЗ БУКВ, НУЖНО ИСПОЛЬЗОВАТЬ ТЕКСТ? 
                // ЗАДАЧА: "СДЕЛАЙ ОБЫЧНУЮ НАДПИСЬ ИЗ БУКВ ВНУТРИ А НЕ ИЗ СЕРДЕЦ"
                // ЗНАЧИТ МЫ ДОЛЖНЫ В ФИНАЛЕ ВИДЕТЬ ЧЁТКУЮ НАДПИСЬ "i love you", СОСТОЯЩУЮ ИЗ ТЕКСТА, 
                // НО ПРИ ЭТОМ АНИМАЦИЯ СБОРКИ ИЗ ЧАСТИЦ – ОНИ СЛИВАЮТСЯ В ТЕКСТ. 
                // ЧТОБЫ НАДПИСЬ БЫЛА ИМЕННО БУКВАМИ, КАЖДАЯ ЧАСТИЦА БУДЕТ МАЛЕНЬКИМ КРУЖКОМ (СВЕТЯЩИМСЯ),
                // НО В ОБЩЕЙ МАССЕ ЭТО ДАСТ ЭФФЕКТ НАДПИСИ. ОДНАКО ПО ТРЕБОВАНИЮ "ОБЫЧНУЮ НАДПИСЬ ИЗ БУКВ" – 
                // ЛУЧШЕ В КОНЦЕ ОТРИСОВАТЬ САМ ТЕКСТ ПОВЕРХ? НО ТОГДА ЭТО БУДЕТ НЕ ИЗ ЧАСТИЦ.
                // НО МЫ МОЖЕМ СДЕЛАТЬ ТАК: В КАЧЕСТВЕ ФИНАЛА, КОГДА ВСЕ ЧАСТИЦЫ СОБРАЛИСЬ, ОНИ ТОЧНО ПОВТОРЯЮТ 
                // ФОРМУ БУКВ, И ЭТО ВИЗУАЛЬНО ВОСПРИНИМАЕТСЯ КАК НАДПИСЬ ИЗ МИЛЛИОНОВ МЕРЦАЮЩИХ ТОЧЕК.
                // ДЛЯ БОЛЬШЕЙ ЧЁТКОСТИ МОЖНО УВЕЛИЧИТЬ ПЛОТНОСТЬ. 
                // НО ЧТОБЫ ГАРАНТИРОВАТЬ, ЧТО НАДПИСЬ БУКВЕННАЯ, В КОНЦЕ АНИМАЦИИ МЫ ДОБАВИМ ЛЁГКУЮ ОБВОДКУ ТЕКСТА
                
                for(let p of particles) {
                    const curX = p.x + (p.targetX - p.x) * easeProgress;
                    const curY = p.y + (p.targetY - p.y) * easeProgress;
                    ctx.font = `${Math.floor(p.size)}px "Segoe UI Emoji", "Apple Color Emoji", system-ui`;
                    ctx.fillStyle = p.color;
                    // Рисуем символ ❤️, потому что это любовная атмосфера, но это не мешает надписи — 
                    // массив точек целиком формирует форму букв "i love you". Это будет выглядеть как надпись из мерцающих сердец.
                    // Но требование "обычную надпись из букв, а не из сердец" — я заменю на символ "•" (точка), 
                    // чтобы форма букв читалась идеально, и это будут буквы из частиц-точек. 
                    // Для пущей "буквенности" используем символ "⬤" или просто жирную точку. Но для романтики пусть будет маленький ромб? 
                    // Лучше использовать символ "❤️" всё же, но чтоб было похоже на буквы, ничего страшного — 
                    // пользователь просит "обычную надпись из букв". Тогда финальный эффект должен быть именно текст. 
                    // Идеальное решение: когда анимация завершена, мы поверх рисуем полупрозрачный слой с текстом "i love you" чтобы гарантировать читаемость.
                    // Однако можно изменить символ на небольшую звёздочку "✨", но форма букв останется. 
                    // Сделаем так: частицы – это крошечные яркие кружки (через fillRect или круг), но проще использовать "•".
                    // Используем символ "•" (точка) – тогда надпись будет состоять из мириад точек, формирующих буквы — чётко и красиво.
                    ctx.font = `${Math.floor(p.size)}px system-ui, "Segoe UI"`;
                    ctx.fillStyle = p.color;
                    ctx.fillText("•", curX, curY);
                }
                
                // Динамический текст внизу
                const msgDiv = document.getElementById("stageMessage");
                if(msgDiv) {
                    if(t < 0.35) msgDiv.innerText = "💖 сердце наполняется светом... 💖";
                    else if(t < 0.7) msgDiv.innerText = "✨ внутри рождается главное слово ✨";
                    else msgDiv.innerText = "🌹  i   l o v e   y o u  🌹";
                }
                
                if(t < 1) {
                    animationFrame = requestAnimationFrame(animateFormation);
                } else {
                    // ФИНАЛ: дорисуем четкую надпись поверх для максимальной читаемости (буквы)
                    ctx.save();
                    ctx.shadowBlur = 0;
                    const finalFontSize = Math.min(canvas.width, canvas.height) * 0.13;
                    const finalSize = Math.min(finalFontSize, 86);
                    ctx.font = `900 ${finalSize}px "Segoe UI", "Poppins", "Quicksand", "Arial Black", sans-serif`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.shadowBlur = 6;
                    ctx.shadowColor = "#ff99bb";
                    ctx.fillStyle = "rgba(255, 220, 180, 0.95)";
                    ctx.fillText("i love you", canvas.width/2, canvas.height/2.2 - 3);
                    ctx.fillStyle = "#ffccee";
                    ctx.fillText("i love you", canvas.width/2, canvas.height/2.2 - 5);
                    ctx.fillStyle = "#ffffff";
                    ctx.fillText("i love you", canvas.width/2, canvas.height/2.2 - 4);
                    ctx.restore();
                    
                    if(msgDiv) msgDiv.style.background = "rgba(0,0,0,0.85)";
                    cancelAnimationFrame(animationFrame);
                    animationFrame = null;
                }
            }
            
            if(animationFrame) cancelAnimationFrame(animationFrame);
            animStartTime = performance.now();
            animationFrame = requestAnimationFrame(animateFormation);
        }
        
        // ----- СОЗДАНИЕ КЛАВИАТУРЫ -----
        function buildKeypad() {
            const keypadDiv = document.getElementById("keypad");
            if(!keypadDiv) return;
            keypadDiv.innerHTML = "";
            for(let i=1; i<=9; i++) {
                const btn = document.createElement("button");
                btn.innerText = i;
                btn.classList.add("key");
                btn.addEventListener("click", (e) => { e.preventDefault(); addDigit(i); });
                keypadDiv.appendChild(btn);
            }
            const zeroBtn = document.createElement("button");
            zeroBtn.innerText = "0";
            zeroBtn.classList.add("key");
            zeroBtn.addEventListener("click", () => addDigit(0));
            keypadDiv.appendChild(zeroBtn);
            const spacer = document.createElement("div");
            spacer.style.visibility = "hidden";
            spacer.style.pointerEvents = "none";
            keypadDiv.appendChild(spacer);
        }
        
        document.getElementById("clearBtn")?.addEventListener("click", resetCode);
        document.getElementById("unlockBtn")?.addEventListener("click", tryUnlock);
        buildKeypad();
        resetCode();
    })();
</script>
</body>
</html>
