<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>замок любви.</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #1e2a2c 0%, #121b1f 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', 'Quicksand', system-ui, sans-serif;
            padding: 20px;
        }

        .app-container {
            position: relative;
            width: 100%;
            max-width: 550px;
            margin: auto;
        }

        .lock-panel {
            background: rgba(35, 28, 22, 0.9);
            backdrop-filter: blur(3px);
            border-radius: 68px;
            padding: 2rem 1.5rem;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.6), inset 0 1px 3px rgba(255, 255, 255, 0.15);
            border: 1px solid #c9a87b;
            transition: opacity 0.6s, transform 0.6s;
        }

        .lock-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .lock-icon {
            font-size: 4rem;
            filter: drop-shadow(4px 6px 8px rgba(0,0,0,0.4));
        }

        .lock-title {
            color: #f7e9c3;
            font-weight: 600;
            letter-spacing: 2px;
            font-size: 1.25rem;
            text-transform: uppercase;
            background: #2c2118b3;
            display: inline-block;
            padding: 5px 20px;
            border-radius: 40px;
            backdrop-filter: blur(4px);
            margin-top: 8px;
        }

        .digit-code {
            display: flex;
            justify-content: center;
            gap: 28px;
            margin: 30px 0 25px;
        }

        .digit-slot {
            background: #0f0e0c;
            width: 85px;
            height: 100px;
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4.2rem;
            font-weight: 800;
            font-family: monospace;
            color: #fae67a;
            text-shadow: 0 0 5px #ffb347;
            box-shadow: inset 0 3px 8px rgba(0,0,0,0.6), 0 8px 12px rgba(0,0,0,0.3);
            border-bottom: 3px solid #ccb18b;
            background: #1e1914;
        }

        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 14px;
            max-width: 280px;
            margin: 20px auto 10px;
        }

        .key {
            background: #3e2c1e;
            border: none;
            font-size: 2rem;
            font-weight: bold;
            color: #ffecb3;
            padding: 12px 0;
            border-radius: 48px;
            font-family: monospace;
            cursor: pointer;
            transition: all 0.1s ease;
            box-shadow: 0 6px 0 #120e0a;
            transform: translateY(-2px);
        }

        .key:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #120e0a;
        }

        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .btn {
            background: #4a3a2a;
            border: none;
            padding: 8px 22px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            color: #fff2df;
            transition: 0.1s;
            box-shadow: 0 3px 5px rgba(0,0,0,0.3);
        }

        .btn:active {
            transform: scale(0.96);
        }

        .status-msg {
            text-align: center;
            margin-top: 20px;
            font-weight: 600;
            color: #ffdd99;
            background: #2f241bc9;
            padding: 6px;
            border-radius: 60px;
            font-size: 0.9rem;
        }

        .lock-panel.hidden {
            opacity: 0;
            visibility: hidden;
            transform: scale(0.92);
            pointer-events: none;
            transition: visibility 0.5s, opacity 0.5s, transform 0.5s;
        }

        .hearts-canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #0a0508;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: opacity 1s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .hearts-canvas-container.active {
            opacity: 1;
            visibility: visible;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .info-love {
            position: absolute;
            bottom: 25px;
            left: 0;
            right: 0;
            text-align: center;
            font-family: 'Segoe UI', monospace;
            color: rgba(255,240,210,1);
            font-size: 18px;
            font-weight: bold;
            pointer-events: none;
            z-index: 1100;
            background: rgba(0,0,0,0.75);
            padding: 10px 24px;
            border-radius: 60px;
            width: fit-content;
            margin: 0 auto;
            backdrop-filter: blur(12px);
            letter-spacing: 1px;
        }

        @media (max-width: 550px) {
            .digit-slot {
                width: 70px;
                height: 85px;
                font-size: 3.2rem;
            }
            .key {
                font-size: 1.8rem;
                padding: 8px 0;
            }
            .info-love {
                font-size: 14px;
                bottom: 15px;
            }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div id="lockPanel" class="lock-panel">
        <div class="lock-header">
            <div class="lock-icon">🔒</div>
            <div class="lock-title">ТАЙНА СЕРДЦА</div>
        </div>
        <div class="digit-code">
            <div class="digit-slot" id="digit1">0</div>
            <div class="digit-slot" id="digit2">0</div>
            <div class="digit-slot" id="digit3">0</div>
        </div>
        <div class="keypad" id="keypad"></div>
        <div class="action-buttons">
            <button class="btn" id="clearBtn">🗑️ СБРОС</button>
            <button class="btn" id="unlockBtn">🔓 ОТКРЫТЬ</button>
        </div>
        <div class="status-msg" id="statusMsg">
            Введи 3 цифры (код 172)
        </div>
    </div>
</div>

<div id="heartsStage" class="hearts-canvas-container">
    <canvas id="heartCanvas" width="1200" height="800"></canvas>
    <div class="info-love" id="stageMessage">💗 Сердце наполняется любовью... 💗</div>
</div>

<script>
    (function() {
        const SECRET_CODE = "172";
        let enteredCode = "";
        
        const digitEls = {
            0: document.getElementById("digit1"),
            1: document.getElementById("digit2"),
            2: document.getElementById("digit3")
        };
        const statusMsgDiv = document.getElementById("statusMsg");
        const lockPanelDiv = document.getElementById("lockPanel");
        const heartsContainer = document.getElementById("heartsStage");
        
        function updateDisplay() {
            let padded = enteredCode.padEnd(3, "0");
            for(let i=0; i<3; i++) digitEls[i].innerText = padded[i];
        }
        
        function addDigit(num) {
            if(enteredCode.length >= 3) {
                statusMsgDiv.innerText = "❌ Код заполнен, нажми СБРОС";
                return;
            }
            enteredCode += num.toString();
            updateDisplay();
            statusMsgDiv.innerText = `⭐ Код: ${enteredCode.padEnd(3,'_')}`;
            if(enteredCode.length === 3) statusMsgDiv.innerText = `🔍 Готово! Нажми "ОТКРЫТЬ"`;
        }
        
        function resetCode() {
            enteredCode = "";
            updateDisplay();
            statusMsgDiv.innerText = "✨ Сброс. Введите 3 цифры";
        }
        
        function tryUnlock() {
            if(enteredCode.length !== 3) {
                statusMsgDiv.innerText = "⚠️ Введите ровно 3 цифры";
                return;
            }
            if(enteredCode === SECRET_CODE) {
                statusMsgDiv.innerText = "❤️ Код верен! Замок открывается... ❤️";
                lockPanelDiv.classList.add("hidden");
                heartsContainer.classList.add("active");
                startClearHeartAnimation();
            } else {
                statusMsgDiv.innerText = "❌ Неверный код! Попробуй 172";
                const digitBoxes = document.querySelectorAll('.digit-slot');
                digitBoxes.forEach(box => {
                    box.style.transform = 'translateX(4px)';
                    setTimeout(()=>{ box.style.transform = ''; }, 100);
                });
                resetCode();
            }
        }
        
        let particles = [];
        let animationFrameId = null;
        let startTime = 0;
        const ANIM_DURATION = 10000;
        
        function startClearHeartAnimation() {
            if(animationFrameId) {
                cancelAnimationFrame(animationFrameId);
                animationFrameId = null;
            }
            
            const canvas = document.getElementById("heartCanvas");
            const ctx = canvas.getContext("2d");
            if (!canvas) return;
            
            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                if(particles.length) generateTargets(canvas);
            }
            window.addEventListener('resize', () => {
                resizeCanvas();
                if(particles.length) generateTargets(canvas);
            });
            resizeCanvas();
            
            function generateTargets(canvas) {
                const w = canvas.width;
                const h = canvas.height;
                const centerX = w / 2;
                const centerY = h / 2.25; // чуть выше для лучшего баланса
                const heartScale = Math.min(w, h) * 0.42;
                
                // ---- 1. Контур перевернутого сердца (тонкий, чтобы не перебивать надпись) ----
                function getInvertedHeartPoint(t, scale, offX, offY) {
                    let xOrig = 16 * Math.pow(Math.sin(t), 3);
                    let yOrig = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t);
                    let yInv = -yOrig;
                    let px = offX + xOrig * scale;
                    let py = offY + yInv * scale;
                    return {x: px, y: py};
                }
                
                let contourTargets = [];
                // основной контур (более тонкий, чтобы не сливался)
                for(let i = 0; i <= 500; i++) {
                    let t = (i / 500) * Math.PI * 2;
                    let pt = getInvertedHeartPoint(t, heartScale / 18.5, centerX, centerY);
                    contourTargets.push(pt);
                }
                // небольшое утолщение для красоты, но не слишком много
                for(let i = 0; i < 1800; i++) {
                    let idx = Math.floor(Math.random() * contourTargets.length);
                    let base = contourTargets[idx];
                    let angle = Math.random() * Math.PI * 2;
                    let rad = 5 + Math.random() * 8;
                    contourTargets.push({
                        x: base.x + Math.cos(angle) * rad,
                        y: base.y + Math.sin(angle) * rad
                    });
                }
                
                // ---- 2. НАДПИСЬ "i love you" - УМЕНЬШЕННАЯ, ЧЁТКАЯ, НЕ СЛИВАЕТСЯ С КОНТУРОМ ----
                const textCanvas = document.createElement('canvas');
                textCanvas.width = w;
                textCanvas.height = h;
                const textCtx = textCanvas.getContext('2d');
                
                // УМЕНЬШАЕМ ШРИФТ (было 0.125, стало 0.09) и смещаем выше, чтобы не касалось краёв сердца
                let fontSize = Math.min(w, h) * 0.092;
                textCtx.font = `900 ${fontSize}px "Segoe UI", "Poppins", "Quicksand", system-ui, "Arial Black", sans-serif`;
                textCtx.textAlign = 'center';
                textCtx.textBaseline = 'middle';
                textCtx.fillStyle = 'white';
                // Добавляем контурный обвод для чёткости (белая обводка)
                textCtx.shadowBlur = 0;
                textCtx.fillStyle = '#FFFFFF';
                textCtx.fillText("i love you", centerX, centerY + heartScale * 0.02);
                
                // ВТОРОЙ ПРОХОД: ещё раз для плотности
                textCtx.fillStyle = '#FFFFFF';
                textCtx.fillText("i love you", centerX, centerY + heartScale * 0.02);
                
                const imgData = textCtx.getImageData(0, 0, w, h);
                const data = imgData.data;
                
                // Область внутри сердца - делаем чуть уже, чтобы надпись была дальше от краёв
                function isInsideHeartTextArea(px, py) {
                    let dx = (px - centerX) / (heartScale * 0.92);
                    let dy = (py - centerY) / (heartScale * 0.85);
                    return (dx*dx + dy*dy) < 1.2;
                }
                
                let textTargets = [];
                // Очень высокое разрешение для сплошного текста
                for(let py = 0; py < h; py += 0.7) {
                    for(let px = 0; px < w; px += 0.7) {
                        const ix = Math.floor(px);
                        const iy = Math.floor(py);
                        if(ix >= 0 && ix < w && iy >=0 && iy < h) {
                            const idx = (iy * w + ix) * 4;
                            if(idx < data.length && data[idx] > 210) {
                                if(isInsideHeartTextArea(px, py)) {
                                    // множественные копии для плотности
                                    textTargets.push({x: px, y: py});
                                    textTargets.push({x: px + 0.6, y: py - 0.5});
                                    textTargets.push({x: px - 0.5, y: py + 0.6});
                                    textTargets.push({x: px + 0.4, y: py + 0.7});
                                }
                            }
                        }
                    }
                }
                
                // МАССИВНОЕ УПЛОТНЕНИЕ внутри надписи (без разрывов)
                for(let i = 0; i < 15000; i++) {
                    let angleRand = Math.random() * Math.PI * 2;
                    let rad = Math.random() * heartScale * 0.75;
                    let testX = centerX + Math.cos(angleRand) * rad;
                    let testY = centerY + Math.sin(angleRand) * rad * 0.85;
                    if(isInsideHeartTextArea(testX, testY)) {
                        let ix = Math.floor(testX);
                        let iy = Math.floor(testY);
                        if(ix>=0 && ix<w && iy>=0 && iy<h) {
                            let idx = (iy * w + ix) * 4;
                            if(idx < data.length && data[idx] > 140) {
                                for(let k=0;k<4;k++) {
                                    textTargets.push({x: testX + (Math.random()-0.5)*1.4, y: testY + (Math.random()-0.5)*1.4});
                                }
                            }
                        }
                    }
                }
                
                // ИНТЕРПОЛЯЦИЯ для заполнения пробелов между буквами
                let finalTextTargets = [];
                for(let i=0; i<textTargets.length; i++) {
                    finalTextTargets.push(textTargets[i]);
                    if(i % 2 === 0 && i+1 < textTargets.length) {
                        let a = textTargets[i];
                        let b = textTargets[i+1];
                        let dist = Math.hypot(a.x - b.x, a.y - b.y);
                        if(dist < 7 && dist > 1.0) {
                            let mx = (a.x + b.x) / 2;
                            let my = (a.y + b.y) / 2;
                            finalTextTargets.push({x: mx, y: my});
                            finalTextTargets.push({x: mx + (Math.random()-0.5)*1.1, y: my + (Math.random()-0.5)*1.1});
                        }
                    }
                }
                
                console.log(`Точек надписи (уменьшенной и чёткой): ${finalTextTargets.length}, контура: ${contourTargets.length}`);
                
                // РАСПРЕДЕЛЕНИЕ ЧАСТИЦ: 80% на надпись (чтобы доминировала и читалась), 20% на контур
                const TOTAL_PARTICLES = 35000;
                const TEXT_PERCENT = 0.80;
                
                let newParticles = [];
                for(let i = 0; i < TOTAL_PARTICLES; i++) {
                    let useText = Math.random() < TEXT_PERCENT;
                    let target = null;
                    if(useText && finalTextTargets.length > 0) {
                        let idx = Math.floor(Math.random() * finalTextTargets.length);
                        target = finalTextTargets[idx];
                    } else if(contourTargets.length > 0) {
                        let idx = Math.floor(Math.random() * contourTargets.length);
                        target = contourTargets[idx];
                    } else {
                        target = {x: centerX, y: centerY};
                    }
                    
                    // ЯРКИЕ НАСЫЩЕННЫЕ ЦВЕТА для контраста (надпись будет ярко-розовой/красной)
                    let colorChoice;
                    if(useText) {
                        // Для надписи используем чистые яркие оттенки (розовый, алый, коралловый) — максимально заметно
                        colorChoice = `hsl(${Math.random() * 15 + 340}, 85%, 65%)`;
                    } else {
                        // Контур — чуть приглушённые, тёплые тона
                        colorChoice = `hsl(${Math.random() * 25 + 350}, 70%, 55%)`;
                    }
                    
                    newParticles.push({
                        x: Math.random() * w,
                        y: Math.random() * h,
                        targetX: target.x,
                        targetY: target.y,
                        color: colorChoice,
                        size: 10 + Math.random() * 14
                    });
                }
                
                // Перемешиваем
                for(let i = newParticles.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [newParticles[i], newParticles[j]] = [newParticles[j], newParticles[i]];
                }
                
                particles = newParticles;
            }
            
            generateTargets(canvas);
            startTime = performance.now();
            
            function animate(currentTime) {
                if (!ctx) return;
                const elapsed = currentTime - startTime;
                let t = Math.min(1, elapsed / ANIM_DURATION);
                const eased = 1 - Math.pow(1 - t, 2.6);
                
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.globalCompositeOperation = 'source-over';
                ctx.shadowBlur = 0;
                
                // Сначала рисуем контур (чтобы он был позади надписи)
                for (let p of particles) {
                    // если это частица контура (цвет чуть темнее) - рисуем сзади, но т.к. все рисуются вместе - порядок не критичен
                    const currX = p.x + (p.targetX - p.x) * eased;
                    const currY = p.y + (p.targetY - p.y) * eased;
                    ctx.font = `${Math.floor(p.size)}px "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", system-ui`;
                    ctx.fillStyle = p.color;
                    ctx.fillText("❤️", currX, currY);
                }
                
                const msgDiv = document.getElementById("stageMessage");
                if(msgDiv) {
                    if(t < 0.3) msgDiv.innerText = "✨ Сердце наполняется искрами... ✨";
                    else if(t < 0.65) msgDiv.innerText = "💖 Внутри проявляется признание 💖";
                    else msgDiv.innerText = "❤️  i   love   you  ❤️";
                }
                
                if (t < 1) {
                    animationFrameId = requestAnimationFrame(animate);
                } else {
                    // Финальная фиксация с небольшим свечением для читаемости
                    ctx.save();
                    ctx.shadowBlur = 5;
                    ctx.shadowColor = "rgba(255, 100, 130, 0.7)";
                    for (let p of particles) {
                        ctx.font = `${Math.floor(p.size)}px "Segoe UI Emoji"`;
                        ctx.fillStyle = p.color;
                        ctx.fillText("❤️", p.targetX, p.targetY);
                    }
                    ctx.restore();
                    if(msgDiv) msgDiv.style.background = "rgba(0,0,0,0.85)";
                    cancelAnimationFrame(animationFrameId);
                    animationFrameId = null;
                }
            }
            
            if(animationFrameId) cancelAnimationFrame(animationFrameId);
            startTime = performance.now();
            animationFrameId = requestAnimationFrame(animate);
        }
        
        function buildKeypad() {
            const keypadDiv = document.getElementById("keypad");
            keypadDiv.innerHTML = "";
            for(let i=1; i<=9; i++) {
                const btn = document.createElement("button");
                btn.innerText = i;
                btn.classList.add("key");
                btn.addEventListener("click", (e) => { e.stopPropagation(); addDigit(i); });
                keypadDiv.appendChild(btn);
            }
            const zeroBtn = document.createElement("button");
            zeroBtn.innerText = "0";
            zeroBtn.classList.add("key");
            zeroBtn.addEventListener("click", () => addDigit(0));
            keypadDiv.appendChild(zeroBtn);
            const dummy = document.createElement("div");
            dummy.style.visibility = "hidden";
            keypadDiv.appendChild(dummy);
        }
        
        document.getElementById("clearBtn").addEventListener("click", resetCode);
        document.getElementById("unlockBtn").addEventListener("click", tryUnlock);
        buildKeypad();
        resetCode();
    })();
</script>
</body>
</html>
